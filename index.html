<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>成績查詢系統</title>
    <style>
        body {
            /* 強制使用新細明體，這是還原「校務系統感」的關鍵 */
            font-family: "新細明體", "PMingLiU", "MingLiU", serif;
            font-size: 12px; /* 標準校務系統字體大小 */
            line-height: 1.5;
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            -webkit-text-size-adjust: none; /* 防止行動裝置自動縮放字體 */
        }

        /* 頂部藍色 Tab 欄 */
        .header-tabs {
            background-color: #0054A6;
            color: #FFFFFF;
            font-size: 13px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #000;
        }
        
        .active-tab {
            color: #FFFF00; /* 經典黃色選中態 */
            font-weight: bold;
            text-decoration: none;
        }

        .tab-item {
            color: #FFFFFF;
            text-decoration: none;
            margin: 0 4px;
        }

        /* 主區域 */
        .main-container {
            padding: 15px;
            text-align: center;
        }

        /* 按鈕樣式 */
        .btn-print {
            font-family: "新細明體", serif;
            font-size: 12px;
            padding: 1px 4px;
            margin-bottom: 10px;
        }

        /* 標題與個人資訊 */
        .exam-title {
            color: #0000FF;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .student-info {
            font-size: 12px;
            margin-bottom: 12px;
        }

        /* 表格精確還原 */
        .score-table {
            width: 420px;
            margin: 0 auto;
            border-collapse: collapse;
            border: 1px solid #666666;
        }

        .score-table th {
            background-color: #0000FF; /* 鮮藍色背景 */
            color: #FFFFFF;
            font-weight: normal;
            padding: 3px 5px;
            border: 1px solid #666666;
        }

        .score-table td {
            padding: 3px 8px;
            border: 1px solid #CCCCCC;
            height: 20px;
        }

        /* 分數欄位特殊藍色與對齊 */
        .score-cell {
            color: #0000FF;
            text-align: right;
            width: 80px;
        }

        .subject-cell {
            text-align: left;
            background-color: #FFFFFF;
        }

        /* 隔行變色 */
        .row-even {
            background-color: #F2F2F2;
        }

        /* 底部統計資訊 */
        .stats-row {
            margin-top: 15px;
            font-size: 13px;
            word-spacing: 15px; /* 模擬空格間距 */
        }
    </style>
</head>
<body>

    <div class="header-tabs">
        <span class="active-tab">📝 查詢學生資料</span>
        <span style="color:#ccc; margin:0 5px;">|</span><a href="#" class="tab-item">基本資料</a>
        <span style="color:#ccc; margin:0 5px;">|</span><a href="#" class="tab-item">綜合表現獎懲</a>
        <span style="color:#ccc; margin:0 5px;">|</span><a href="#" class="tab-item">缺曠統計</a>
        <span style="color:#ccc; margin:0 5px;">|</span><a href="#" class="tab-item">異動記錄</a>
        <span style="color:#ccc; margin:0 5px;">|</span><a href="#" class="tab-item">歷年成績</a>
        <span style="color:#ccc; margin:0 5px;">|</span><a href="#" class="tab-item">各式成績查詢</a>
    </div>

    <div class="main-container">
        <input type="button" value="列印" class="btn-print">
        
        <div class="exam-title">【706】【114下】114-2第一次段考成績</div>
        
        <div class="student-info">
            學號：114228 &nbsp;&nbsp; 姓名：林昊霆 &nbsp;&nbsp; 班級：706
        </div>

        <table class="score-table">
            <thead>
                <tr>
                    <th>考試科目</th>
                    <th>考試成績</th>
                    <th>全班平均</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="subject-cell">國語文</td>
                    <td class="score-cell">100</td>
                    <td class="score-cell">64.74</td>
                </tr>
                <tr class="row-even">
                    <td class="subject-cell">數學</td>
                    <td class="score-cell">100</td>
                    <td class="score-cell">74.77</td>
                </tr>
                <tr>
                    <td class="subject-cell">英語文</td>
                    <td class="score-cell">100</td>
                    <td class="score-cell">80.77</td>
                </tr>
                <tr class="row-even">
                    <td class="subject-cell">社會</td>
                    <td class="score-cell">100</td>
                    <td class="score-cell">85.07</td>
                </tr>
                <tr>
                    <td class="subject-cell">生物</td>
                    <td class="score-cell">100</td>
                    <td class="score-cell">80.98</td>
                </tr>
                <tr class="row-even">
                    <td class="subject-cell">英會</td>
                    <td class="score-cell">100</td>
                    <td class="score-cell">94.56</td>
                </tr>
            </tbody>
        </table>

        <div class="stats-row">
            總分：600 &nbsp;&nbsp; 平均：100.00 &nbsp;&nbsp; 排名：1 &nbsp;&nbsp; 年級排名：1 &nbsp;&nbsp; 類組排名：
        </div>
    </div>

</body>
</html>
